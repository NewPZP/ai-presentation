<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识幻灯片 — AI Presentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.base.css">
  <link rel="stylesheet" href="assets/styles.cards.css">
</head>
<body>

<header class="hero">
  <div class="hero-eyebrow">curated knowledge decks</div>
  <h1>知识<em>幻灯片</em></h1>
  <p class="hero-sub">用 HTML 重新定义知识分享——每一组课题都是一份可交互、可沉淀的活文档。</p>
  <div class="hero-stats">
    <div><div class="hero-stat-num" id="stat-count">0</div><div class="hero-stat-label">课题</div></div>
    <div><div class="hero-stat-num" id="stat-slides">0</div><div class="hero-stat-label">页面</div></div>
    <div><div class="hero-stat-num" id="stat-tags">0</div><div class="hero-stat-label">标签</div></div>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <input class="search-input" id="search" type="text" placeholder="搜索课题、标签..." autocomplete="off">
  </div>
  <div class="chips" id="chips"></div>
</div>

<div class="grid-wrap">
  <div class="masonry" id="masonry"></div>
</div>

<footer class="footer">
  <span>AI Presentation &mdash; 用 HTML 做知识幻灯片</span>
  <span>新增课题：在根目录新建子文件夹，添加 <code>index.html</code> + <code>meta.json</code>，运行 <code>node scripts/build-courses.mjs</code></span>
</footer>

<script src="assets/app.js"></script>
</body>
</html>
