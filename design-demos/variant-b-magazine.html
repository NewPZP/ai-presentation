<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>知识幻灯片</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;0,9..144,900;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF7;--ink:#1A1A1A;--muted:#7A7A72;--divider:#EDEDED;--terracotta:#D97757;--forest:#2D6A4F;--indigo:#3A5A8C;--warm-brown:#8B6F47;--font-display:'Fraunces',Georgia,serif;--font-body:'Inter',system-ui,sans-serif;--font-hand:'Caveat',cursive}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--ink);font-family:var(--font-body);line-height:1.6;min-height:100vh}
.hero{padding:72px 64px 40px;max-width:1440px;margin:0 auto}
.hero-eyebrow{font-family:var(--font-hand);font-size:1.15rem;color:var(--terracotta);margin-bottom:8px;letter-spacing:.02em}
.hero h1{font-family:var(--font-display);font-weight:900;font-size:3.6rem;line-height:1.08;letter-spacing:-.03em;margin-bottom:16px}
.hero h1 em{color:var(--terracotta);font-style:normal}
.hero-sub{font-size:1.15rem;color:var(--muted);max-width:560px;line-height:1.65}
.hero-stats{display:flex;gap:32px;margin-top:28px}
.hero-stat-num{font-family:var(--font-display);font-weight:700;font-size:2rem;line-height:1}
.hero-stat-label{font-size:.8rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.toolbar{padding:0 64px 20px;max-width:1440px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.search-wrap{position:relative;max-width:420px}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
.search-input{width:100%;padding:10px 16px 10px 42px;border:1.5px solid var(--divider);border-radius:8px;font-size:.95rem;font-family:var(--font-body);background:var(--bg);color:var(--ink);outline:none;transition:border-color .2s}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--terracotta)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:5px 14px;border-radius:20px;font-size:.8rem;font-weight:500;cursor:pointer;border:1.5px solid var(--divider);background:transparent;color:var(--muted);transition:all .2s;user-select:none}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.grid-wrap{padding:12px 64px 80px;max-width:1440px;margin:0 auto}
.masonry{columns:3;column-gap:24px}
.masonry .card{break-inside:avoid;margin-bottom:24px;display:inline-block;width:100%}
.card{text-decoration:none;color:inherit;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);transition:box-shadow .25s,transform .25s;position:relative}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08),0 8px 32px rgba(0,0,0,.05);transform:translateY(-3px)}
.card-cover{position:relative;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-cover-letter{font-family:var(--font-display);font-weight:900;font-size:5rem;color:rgba(255,255,255,.85);line-height:1;user-select:none;position:relative;z-index:1}
.card-cover-letter::after{content:attr(data-letter);position:absolute;top:-12px;left:-8px;color:rgba(255,255,255,.1);font-size:9rem;z-index:0}
.card-badge{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);color:#fff;font-size:.72rem;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.02em}
.card-annotation{position:absolute;bottom:10px;left:14px;font-family:var(--font-hand);font-size:1.05rem;color:rgba(255,255,255,.75);z-index:2}
.card-body{padding:18px 20px 20px}
.card-title{font-family:var(--font-display);font-weight:700;font-size:1.2rem;line-height:1.3;margin-bottom:6px}
.card-desc{font-size:.88rem;color:var(--muted);line-height:1.55;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.card-tag{font-size:.72rem;font-weight:600;padding:2px 10px;border-radius:12px;color:#fff;letter-spacing:.02em}
.card-meta{display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:var(--muted)}
.card.tall .card-cover{aspect-ratio:3/4}
.card.compact .card-cover{aspect-ratio:16/9}
.card.hero-card .card-cover{aspect-ratio:1/1}
.tag-ai{background:var(--terracotta)}.tag-deep-learning{background:#c46a4a}.tag-nlp{background:#b5604a}
.tag-rust{background:var(--forest)}.tag-system{background:#3a7d5f}
.tag-arch{background:var(--indigo)}.tag-design-pattern{background:#4a6a9c}.tag-oop{background:#5078a8}
.tag-d3{background:var(--warm-brown)}.tag-viz{background:#9d7d55}.tag-data{background:#a8895f}
.tag-wasm{background:var(--indigo)}.tag-browser{background:#4f6d9a}.tag-perf{background:#5878a6}
.tag-fp{background:var(--forest)}.tag-haskell{background:#3d8a65}.tag-paradigm{background:#4a9e72}
.empty-state{text-align:center;padding:100px 32px;column-span:all}
.empty-state h3{font-family:var(--font-display);font-weight:700;font-size:1.5rem;margin-bottom:8px}
.empty-state p{color:var(--muted);font-size:.95rem;max-width:360px;margin:0 auto}
.error-state{text-align:center;padding:100px 32px;column-span:all}
.error-state h3{font-family:var(--font-display);font-weight:700;font-size:1.5rem;color:var(--terracotta);margin-bottom:8px}
.error-state p{color:var(--muted);font-size:.95rem;max-width:480px;margin:0 auto}
.error-state code{background:#f0efe8;padding:2px 8px;border-radius:4px;font-size:.85rem}
.footer{padding:32px 64px 48px;max-width:1440px;margin:0 auto;border-top:1.5px solid var(--divider);display:flex;justify-content:space-between;align-items:center;font-size:.8rem;color:var(--muted)}
.footer a{color:var(--terracotta);text-decoration:none}
.footer a:hover{text-decoration:underline}
@media(max-width:1100px){.masonry{columns:2}.hero h1{font-size:2.8rem}}
@media(max-width:720px){.masonry{columns:1}.hero{padding:48px 24px 24px}.toolbar,.grid-wrap{padding-left:24px;padding-right:24px}.hero h1{font-size:2.2rem}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .45s ease both}
.card:nth-child(2){animation-delay:.06s}
.card:nth-child(3){animation-delay:.12s}
.card:nth-child(4){animation-delay:.18s}
.card:nth-child(5){animation-delay:.24s}
.card:nth-child(6){animation-delay:.30s}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--divider);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
</style>
</head>
<body>
<header class="hero">
  <div class="hero-eyebrow">curated knowledge decks</div>
  <h1>知识<em>幻灯片</em></h1>
  <p class="hero-sub">用 HTML 重新定义知识分享——每一组课题都是一份可交互、可沉淀的活文档。</p>
  <div class="hero-stats">
    <div><div class="hero-stat-num" id="stat-count">0</div><div class="hero-stat-label">课题</div></div>
    <div><div class="hero-stat-num" id="stat-slides">0</div><div class="hero-stat-label">页面</div></div>
    <div><div class="hero-stat-num" id="stat-tags">0</div><div class="hero-stat-label">标签</div></div>
  </div>
</header>
<div class="toolbar">
  <div class="search-wrap">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="search-input" id="search" type="text" placeholder="搜索课题、标签...">
  </div>
  <div class="chips" id="chips"></div>
</div>
<div class="grid-wrap">
  <div class="masonry" id="masonry"></div>
</div>
<footer class="footer">
  <span>AI Presentation &mdash; 用 HTML 做知识幻灯片</span>
  <span><a href="https://github.com" target="_blank">GitHub</a></span>
</footer>

<script>
var MOCK_COURSES=[
  {slug:"transformer-intro",entry:"transformer-intro/index.html",cover:"",title:"Transformer 入门",description:"30 分钟讲清楚 Attention 机制与 Transformer 架构核心原理",tags:["AI","深度学习","NLP"],author:"panzhipiao",updatedAt:"2026-06-10",slides:6},
  {slug:"rust-ownership",entry:"rust-ownership/index.html",cover:"",title:"Rust 所有权与生命周期",description:"从零理解 Rust 最独特的内存管理模型",tags:["Rust","系统编程"],author:"panzhipiao",updatedAt:"2026-06-08",slides:12},
  {slug:"design-patterns",entry:"design-patterns/index.html",cover:"",title:"设计模式实战",description:"23 种经典设计模式的现代 JavaScript 实现",tags:["架构","设计模式","OOP"],author:"panzhipiao",updatedAt:"2026-06-05",slides:24},
  {slug:"data-viz",entry:"data-viz/index.html",cover:"",title:"数据可视化入门",description:"用 D3.js 让数据讲故事的完整指南",tags:["D3.js","可视化","数据"],author:"panzhipiao",updatedAt:"2026-05-28",slides:16},
  {slug:"wasm-principles",entry:"wasm-principles/index.html",cover:"",title:"WebAssembly 原理",description:"深入理解 WASM 的编译管线与浏览器运行时",tags:["WASM","浏览器","性能"],author:"panzhipiao",updatedAt:"2026-05-20",slides:10},
  {slug:"functional-programming",entry:"functional-programming/index.html",cover:"",title:"函数式编程思想",description:"从 Haskell 到日常编程的函数式思维迁移",tags:["FP","Haskell","编程范式"],author:"panzhipiao",updatedAt:"2026-05-15",slides:20}
];

var TAG_CLASS_MAP={
  "AI":"tag-ai","深度学习":"tag-deep-learning","NLP":"tag-nlp",
  "Rust":"tag-rust","系统编程":"tag-system",
  "架构":"tag-arch","设计模式":"tag-design-pattern","OOP":"tag-oop",
  "D3.js":"tag-d3","可视化":"tag-viz","数据":"tag-data",
  "WASM":"tag-wasm","浏览器":"tag-browser","性能":"tag-perf",
  "FP":"tag-fp","Haskell":"tag-haskell","编程范式":"tag-paradigm"
};

var COVER_COLORS=[{bg:"var(--terracotta)"},{bg:"var(--forest)"},{bg:"var(--indigo)"},{bg:"var(--warm-brown)"}];
function slugColor(s){var h=0;for(var i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i);return COVER_COLORS[Math.abs(h)%COVER_COLORS.length]}
var ANNOTATIONS=["新","Hot","必读","推荐","精选","Classic"];
function slugAnnotation(s){var h=0;for(var i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i);return ANNOTATIONS[Math.abs(h)%ANNOTATIONS.length]}
var CARD_VARIANTS=["","tall","compact","hero-card","tall","compact"];
function slugVariant(i){return CARD_VARIANTS[i%CARD_VARIANTS.length]}

function allTags(c){var s=new Set();c.forEach(function(x){x.tags.forEach(function(t){s.add(t)})});return Array.from(s).sort()}

function renderChips(tags,active,onToggle){
  var el=document.getElementById("chips");el.innerHTML="";
  var all=document.createElement("button");all.className="chip"+(active===null?" active":"");all.textContent="全部";
  all.addEventListener("click",function(){onToggle(null)});el.appendChild(all);
  tags.forEach(function(t){
    var btn=document.createElement("button");btn.className="chip"+(active===t?" active":"");btn.textContent=t;
    btn.addEventListener("click",function(){onToggle(active===t?null:t)});el.appendChild(btn);
  });
}

function renderCard(course,idx){
  var color=slugColor(course.slug);var firstChar=course.title[0];var variant=slugVariant(idx);var annotation=slugAnnotation(course.slug);
  var a=document.createElement("a");a.className="card "+variant;a.href=course.entry;a.target="_blank";a.rel="noopener";
  var cover=document.createElement("div");cover.className="card-cover";cover.style.background=color.bg;
  var letter=document.createElement("span");letter.className="card-cover-letter";letter.setAttribute("data-letter",firstChar);letter.textContent=firstChar;cover.appendChild(letter);
  var badge=document.createElement("span");badge.className="card-badge";badge.textContent=course.slides+" 页";cover.appendChild(badge);
  var ann=document.createElement("span");ann.className="card-annotation";ann.textContent=annotation;cover.appendChild(ann);
  a.appendChild(cover);
  var body=document.createElement("div");body.className="card-body";
  var title=document.createElement("div");title.className="card-title";title.textContent=course.title;body.appendChild(title);
  var desc=document.createElement("div");desc.className="card-desc";desc.textContent=course.description;body.appendChild(desc);
  var tags=document.createElement("div");tags.className="card-tags";
  course.tags.forEach(function(t){var sp=document.createElement("span");sp.className="card-tag "+(TAG_CLASS_MAP[t]||"tag-ai");sp.textContent=t;tags.appendChild(sp)});
  body.appendChild(tags);
  var meta=document.createElement("div");meta.className="card-meta";
  var dateSpan=document.createElement("span");dateSpan.textContent=course.updatedAt;meta.appendChild(dateSpan);
  var authorSpan=document.createElement("span");authorSpan.textContent=course.author;meta.appendChild(authorSpan);
  body.appendChild(meta);a.appendChild(body);
  return a;
}

function renderGrid(courses){
  var el=document.getElementById("masonry");el.innerHTML="";
  if(!courses.length){
    var empty=document.createElement("div");empty.className="empty-state";
    empty.innerHTML="<h3>没有找到匹配的课题</h3><p>试试换个关键词或清除筛选条件</p>";
    el.appendChild(empty);return;
  }
  courses.forEach(function(c,i){el.appendChild(renderCard(c,i))});
}

function updateStats(courses){
  var tags=allTags(courses);var slides=courses.reduce(function(s,c){return s+c.slides},0);
  document.getElementById("stat-count").textContent=courses.length;
  document.getElementById("stat-slides").textContent=slides;
  document.getElementById("stat-tags").textContent=tags.length;
}

var activeTag=null;var searchQuery="";

function filter(){
  var q=searchQuery.toLowerCase();
  var filtered=MOCK_COURSES.filter(function(c){
    if(activeTag&&c.tags.indexOf(activeTag)===-1)return false;
    if(!q)return true;
    return c.title.toLowerCase().indexOf(q)!==-1||c.description.toLowerCase().indexOf(q)!==-1||c.tags.some(function(t){return t.toLowerCase().indexOf(q)!==-1});
  });
  renderGrid(filtered);
}

function init(){
  var tags=allTags(MOCK_COURSES);
  updateStats(MOCK_COURSES);
  renderChips(tags,activeTag,function(t){activeTag=t;filter()});
  renderGrid(MOCK_COURSES);
  document.getElementById("search").addEventListener("input",function(e){searchQuery=e.target.value;filter()});
}
init();
</script>
</body>
</html>
